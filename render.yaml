# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Uses SQLite on the instance disk (fine for demos). Data resets if the free
# instance spins down or redeploys. For persistent data, add a Render Postgres
# database and set DATABASE_URL (see README).

services:
  - type: web
    name: jobfinder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input
    startCommand: gunicorn myproject.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false

{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'cssFiles/style.css' %}">

    <title>Login - JobFinder</title>

    <style>
        .msg {
            font-weight: 600;
            margin-bottom: 1rem;
            color: #b91c1c;
            text-align: center;
            padding: 0.75rem;
            background: #fef2f2;
            border-radius: 10px;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>

<header>
    <div>
        <h1 class="logo">Job<span>Finder</span></h1>
    </div>

    <div class="menu-icon" id="menu-btn">&#9776;</div>

    <nav class="nav-bar" id="nav-menu">
        <ul>
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'jobs' %}">Find Jobs</a></li>
            <li><a href="{% url 'login' %}">Login</a></li>
            <li><a href="{% url 'signup' %}">Sign Up</a></li>
        </ul>
    </nav>
</header>

<main class="auth-shell">
    <div class="auth-card">
        <h2>Welcome back</h2>

        {% if error %}
            <div class="msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="auth-field">
                <label for="id_username">Username</label>
                <input type="text" id="id_username" name="username" placeholder="Your username" required autocomplete="username">
            </div>

            <div class="auth-field">
                <label for="id_password">Password</label>
                <input type="password" id="id_password" name="password" required autocomplete="current-password">
            </div>

            <div class="auth-actions">
                <input type="submit" value="Log in">
            </div>
        </form>

        <h3>Don't have an account?</h3>
        <p><a href="{% url 'signup' %}">Create an account</a></p>
    </div>
</main>

<footer>
    &copy; 2026 JobFinder. All rights reserved.
</footer>

<script src="{% static 'jsFiles/main.js' %}"></script>

</body>
</html>

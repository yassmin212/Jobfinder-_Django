<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Applied Jobs</title>
        <link rel="stylesheet" href="cssFiles/style.css">
    </head>

    <body>
        <header>
        <!--==============Navigation bar===============-->
            <div><h1 class="logo">Job<span>Finder</span></h1></div>

            <div class="menu-icon" id="menu-btn">&#9776;</div>

            <nav class="nav-bar" id="nav-menu">   
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="jobs.html">Find Jobs</a></li>
                    <li><a href="applied-jobs.html">Applied Jobs</a></li>
                    <li><a href="index.html"><button>Logout</button></a></li>
                </ul>
            </nav>
        </header>
        <div class="container">

            <h2>Applied Jobs</h2>

            <div class="job-list" id="appliedContainer"></div>

        </div>
        <footer>
        &copy; 2026 JobFinder. All rights reserved.
    </footer>
    <script>
    document.addEventListener("DOMContentLoaded", function(){

    let appliedJobs = JSON.parse(localStorage.getItem("appliedJobs")) || [];
    let container = document.querySelector(".job-list");

    // لو مفيش تقديمات
    if(appliedJobs.length === 0){
        return;
    }

    // إضافة jobs الجديدة (مش لمس الـ static)
    appliedJobs.forEach(jobName => {

        container.innerHTML += `
        <div class="job-card">
            <div class="job-logo"></div>

            <div class="job-content">
                <h3>${jobName}</h3>

                <p class="company">New Applied Job</p>

                <p class="job-meta">Added from your applications</p>

                <span class="status applied">Applied</span>

                <button class="btn disabled">Applied</button>
            </div>
        </div>
        `;
    });

    });
    </script>
    </body>
</html>
